<section class="all-surveys content-wrapper --colomn-container">
  <div class="all-surveys__toolbar">
    <div class="all-surveys__status-tabs" role="tablist" aria-label="Survey status filter">
      <button
        type="button"
        class="status-tab"
        [class.status-tab--active]="statusFilter === 'all'"
        (click)="setStatusFilter('all')"
      >
        All survey
      </button>
      <button
        type="button"
        class="status-tab"
        [class.status-tab--active]="statusFilter === 'active'"
        (click)="setStatusFilter('active')"
      >
        Active survey
      </button>
      <button
        type="button"
        class="status-tab"
        [class.status-tab--active]="statusFilter === 'past'"
        (click)="setStatusFilter('past')"
      >
        Past survey
      </button>
    </div>

    <div class="all-surveys__category-filter" (mouseleave)="closeCategoryMenu()">
      <button
        type="button"
        class="category-dropdown-trigger"
        [class.category-dropdown-trigger--open]="isCategoryMenuOpen"
        (click)="toggleCategoryMenu()"
        aria-haspopup="listbox"
        [attr.aria-expanded]="isCategoryMenuOpen"
      >
        <span>{{ selectedCategory === 'all' ? 'Sort by categories' : selectedCategoryLabel }}</span>
        <span class="category-arrow" aria-hidden="true">▾</span>
      </button>

      <div class="category-dropdown" *ngIf="isCategoryMenuOpen">
        <div class="category-dropdown__inner">
        <button
          type="button"
          class="category-option"
          [class.category-option--active]="selectedCategory === 'all'"
          (click)="updateCategory('all')"
        >
          All categories
        </button>
        <button
          type="button"
          class="category-option"
          *ngFor="let category of categories"
          [class.category-option--active]="selectedCategory === category"
          (click)="updateCategory(category)"
        >
          {{ category }}
        </button>
        </div>
      </div>

    </div>
  </div>

  <p class="status-message" *ngIf="isLoading">Umfragen werden geladen...</p>
  <p class="status-message status-message--error" *ngIf="!isLoading && loadError">{{ loadError }}</p>

  <p class="status-message" *ngIf="!isLoading && !loadError && filteredSurveys.length === 0">
    Keine Umfragen fuer diesen Filter gefunden.
  </p>

  <div class="all-surveys__grid" *ngIf="!isLoading && !loadError && filteredSurveys.length > 0">
    <ng-container *ngFor="let survey of filteredSurveys">
      <a class="survey-card" *ngIf="!isSurveyExpired(survey.endDate); else expiredSurveyCard" [routerLink]="['/umfrage', survey.id]">
        <p class="survey-card__category">{{ survey.category }}</p>
        <h3 class="survey-card__title">{{ survey.askName }}</h3>
        <span class="end-date">{{ daysUntilEnd(survey.endDate) }}</span>
      </a>

      <ng-template #expiredSurveyCard>
        <article class="survey-card survey-card--expired" aria-disabled="true">
          <p class="survey-card__category">{{ survey.category }}</p>
          <h3 class="survey-card__title">{{ survey.askName }}</h3>
          <span class="end-date">{{ daysUntilEnd(survey.endDate) }}</span>
        </article>
      </ng-template>
    </ng-container>
  </div>
</section>
